server {
    server_name aurora-develop.ru;

    root /var/www/aurora-landing;
    index index.html;

    # Канонические URL без .html
    location ~ ^/(settings|responses|cabinet|onboarding|auth)$ {
        try_files $uri.html =404;
    }

    # 301 redirect: старые *.html -> чистые URL (сохраняет query string)
    location ~ ^/(settings|responses|cabinet|onboarding|auth)\.html$ {
        return 301 /$1$is_args$args;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
